<!DOCTYPE html>
<html>
<head>
    <title>Hex Game Classic</title>
    <style>
        body { background-color: #111; color: white; text-align: center; font-family: sans-serif; }
        canvas { background-color: #222; border: 2px solid #444; margin-top: 20px; cursor: pointer; }
        #status { font-size: 24px; margin: 20px; color: #00ff00; }
    </style>
</head>
<body>
    <div id="status">RED: Connect Top to Bottom</div>
    <canvas id="hexCanvas"></canvas>

    <script>
        const canvas = document.getElementById('hexCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        
        const SIZE = 7;
        const R = 35; // Radius
        let board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        let gameOver = false;

        canvas.width = 800;
        canvas.height = 600;

        function getPos(r, c) {
            // Simple 2D Grid Logic with Gaps
            const x = 150 + c * (R * 1.75) + r * (R * 0.875);
            const y = 100 + r * (R * 1.5);
            return { x, y };
        }

        function drawHex(x, y, p) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.lineTo(x + R * Math.cos(i * Math.PI / 3), y + R * Math.sin(i * Math.PI / 3));
            }
            ctx.closePath();
            
            // Player 1: Red, Player 2: Blue, Empty: Dark Grey
            ctx.fillStyle = p === 1 ? "#ff4444" : (p === 2 ? "#4444ff" : "#333");
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function checkWin(p) {
            let q = [];
            let vis = new Set();
            for (let i = 0; i < SIZE; i++) {
                let r = (p === 1) ? 0 : i;
                let c = (p === 1) ? i : 0;
                if (board[r][c] === p) {
                    q.push([r, c]);
                    vis.add(r + "," + c);
                }
            }
            while (q.length > 0) {
                let [r, c] = q.shift();
                if ((p === 1 && r === SIZE - 1) || (p === 2 && c === SIZE - 1)) return true;
                const neighbors = [[-1, 0], [1, 0], [0, -1], [0, 1], [-1, 1], [1, -1]];
                for (let [dr, dc] of neighbors) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === p && !vis.has(nr + "," + nc)) {
                        vis.add(nr + "," + nc);
                        q.push([nr, nc]);
                    }
                }
            }
            return false;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const { x, y } = getPos(r, c);
                    drawHex(x, y, board[r][c]);
                }
            }
        }

        canvas.onclick = (e) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const { x, y } = getPos(r, c);
                    if (Math.hypot(mx - x, my - y) < R) {
                        if (board[r][c] === 0) {
                            board[r][c] = 1;
                            render();
                            if (checkWin(1)) {
                                status.innerText = "🏆 YOU WON! 🏆";
                                gameOver = true;
                                return;
                            }
                            setTimeout(aiMove, 500);
                        }
                    }
                }
            }
        };

        function aiMove() {
            let empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) empty.push({ r, c });
                }
            }
            if (empty.length > 0) {
                let m = empty[Math.floor(Math.random() * empty.length)];
                board[m.r][m.c] = 2;
                render();
                if (checkWin(2)) {
                    status.innerText = "AI WON!";
                    gameOver = true;
                }
            }
        }

        render();
    </script>
</body>
</html>
