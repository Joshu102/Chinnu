<!DOCTYPE html>
<html>
<head>
    <title>Hex Pro | Backbencher Championship</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body { background: #020617; color: #fff; text-align: center; font-family: 'Orbitron', sans-serif; overflow: hidden; margin: 0; }
        #status { font-size: 30px; font-weight: bold; margin-top: 25px; text-shadow: 0 0 15px #38bdf8; color: #38bdf8; letter-spacing: 2px; }
        canvas { cursor: crosshair; filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.2)); margin-top: 10px; }
        .instructions { color: #94a3b8; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="status">PLAYER TURN</div>
    <div class="instructions">RED: TOP TO BOTTOM | BLUE: LEFT TO RIGHT</div>
    <canvas id="hexCanvas"></canvas>

    <script>
        const canvas = document.getElementById('hexCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        
        const SIZE = 7;
        const R = 38; // Radius
        const GAP = 8; // Perfect gap to avoid overlap
        let board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        let gameOver = false;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function getPos(r, c) {
            // Slanted layout with professional gaps
            const offsetX = window.innerWidth/2 - 320;
            const x = offsetX + c * (R * 1.75 + GAP) + r * (R * 0.875 + GAP/2);
            const y = 200 + r * (R * 1.5 + GAP/2);
            return { x, y };
        }

        function drawHex(x, y, p) {
            ctx.save();
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.lineTo(x + R * Math.cos(i * Math.PI / 3), y + R * Math.sin(i * Math.PI / 3));
            }
            ctx.closePath();
            
            // Neon Pro Styling
            if (p === 0) {
                ctx.fillStyle = "#1e293b"; // Empty Dark Block
                ctx.strokeStyle = "#334155";
            } else if (p === 1) {
                ctx.fillStyle = "#ef4444"; // Red (Player)
                ctx.strokeStyle = "#ff0000";
                ctx.shadowBlur = 20; ctx.shadowColor = "#ff0000";
            } else {
                ctx.fillStyle = "#0ea5e9"; // Blue (AI)
                ctx.strokeStyle = "#00d4ff";
                ctx.shadowBlur = 20; ctx.shadowColor = "#00d4ff";
            }

            ctx.fill();
            ctx.lineWidth = 3; ctx.stroke();
            ctx.restore();
        }

        function checkWin(p) {
            let q = [], vis = new Set();
            for (let i = 0; i < SIZE; i++) {
                let r = (p === 1) ? 0 : i;
                let c = (p === 1) ? i : 0;
                if (board[r][c] === p) { q.push([r, c]); vis.add(r + "," + c); }
            }
            while (q.length > 0) {
                let [r, c] = q.shift();
                if ((p === 1 && r === SIZE - 1) || (p === 2 && c === SIZE - 1)) return true;
                const neighbors = [[-1, 0], [1, 0], [0, -1], [0, 1], [-1, 1], [1, -1]];
                for (let [dr, dc] of neighbors) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === p && !vis.has(nr + "," + nc)) {
                        vis.add(nr + "," + nc); q.push([nr, nc]);
                    }
                }
            }
            return false;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const { x, y } = getPos(r, c);
                    drawHex(x, y, board[r][c]);
                }
            }
        }

        canvas.onclick = (e) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const { x, y } = getPos(r, c);
                    if (Math.hypot(mx - x, my - y) < R) {
                        if (board[r][c] === 0) {
                            board[r][c] = 1;
                            render();
                            if (checkWin(1)) {
                                status.innerText = "🏆 CHAMPION! YOU WON! 🏆";
                                status.style.color = "#fbbf24";
                                gameOver = true; return;
                            }
                            status.innerText = "AI ANALYZING...";
                            setTimeout(aiMove, 400);
                        }
                    }
                }
            }
        };

        function aiMove() {
            let empty = [];
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (board[r][c] === 0) empty.push({ r, c });
            if (empty.length > 0) {
                // Defensive AI Logic: Blocks your vertical progress
                empty.sort((a,b) => b.r - a.r); 
                let move = empty[Math.floor(Math.random() * Math.min(empty.length, 3))];
                board[move.r][move.c] = 2;
                render();
                if (checkWin(2)) {
                    status.innerText = "🤖 AI CONQUERED! YOU LOST! 🤖";
                    status.style.color = "#0ea5e9";
                    gameOver = true;
                } else { status.innerText = "PLAYER TURN"; }
            }
        }

        render();
    </script>
</body>
</html>
