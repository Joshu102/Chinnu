<!DOCTYPE html>
<html>
<head>
    <title>Hex Pro | Full Screen Fix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        body { background: #020617; color: #fff; text-align: center; font-family: 'Orbitron', sans-serif; overflow: hidden; margin: 0; padding: 0; }
        #status { font-size: 28px; font-weight: bold; padding: 15px; text-shadow: 0 0 15px #38bdf8; color: #38bdf8; letter-spacing: 2px; }
        canvas { cursor: crosshair; filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.2)); display: block; margin: 0 auto; }
        .instructions { color: #94a3b8; font-size: 13px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="status">PLAYER TURN</div>
    <div class="instructions">RED: TOP TO BOTTOM | BLUE: LEFT TO RIGHT</div>
    <canvas id="hexCanvas"></canvas>

    <script>
        const canvas = document.getElementById('hexCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        
        const SIZE = 7;
        let R, GAP, board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        let gameOver = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 100;
            // Dynamic Radius based on screen size so it never cuts
            R = Math.min(canvas.width, canvas.height) / 16;
            GAP = R * 0.2;
            render();
        }

        window.addEventListener('resize', resize);

        function getPos(r, c) {
            // Perfect centering logic
            const totalWidth = (SIZE-1) * (R * 1.75 + GAP) + (SIZE-1) * (R * 0.875 + GAP/2);
            const totalHeight = (SIZE-1) * (R * 1.5 + GAP/2);
            
            const startX = (canvas.width - totalWidth) / 2;
            const startY = (canvas.height - totalHeight) / 2 + 20;

            const x = startX + c * (R * 1.75 + GAP) + r * (R * 0.875 + GAP/2);
            const y = startY + r * (R * 1.5 + GAP/2);
            return { x, y };
        }

        function drawHex(x, y, p) {
            ctx.save();
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                ctx.lineTo(x + R * Math.cos(i * Math.PI / 3), y + R * Math.sin(i * Math.PI / 3));
            }
            ctx.closePath();
            
            if (p === 0) {
                ctx.fillStyle = "#1e293b"; 
                ctx.strokeStyle = "#334155";
            } else if (p === 1) {
                ctx.fillStyle = "#ef4444"; 
                ctx.strokeStyle = "#ff0000";
                ctx.shadowBlur = 25; ctx.shadowColor = "#ff0000";
            } else {
                ctx.fillStyle = "#0ea5e9"; 
                ctx.strokeStyle = "#00d4ff";
                ctx.shadowBlur = 25; ctx.shadowColor = "#00d4ff";
            }

            ctx.fill();
            ctx.lineWidth = 2.5; ctx.stroke();
            ctx.restore();
        }

        function checkWin(p) {
            let q = [], vis = new Set();
            for (let i = 0; i < SIZE; i++) {
                let r = (p === 1) ? 0 : i;
                let c = (p === 1) ? i : 0;
                if (board[r][c] === p) { q.push([r, c]); vis.add(r + "," + c); }
            }
            while (q.length > 0) {
                let [r, c] = q.shift();
                if ((p === 1 && r === SIZE - 1) || (p === 2 && c === SIZE - 1)) return true;
                const neighbors = [[-1,0],[1,0],[0,-1],[0,1],[-1,1],[1,-1]];
                for (let [dr, dc] of neighbors) {
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === p && !vis.has(nr + "," + nc)) {
                        vis.add(nr + "," + nc); q.push([nr, nc]);
                    }
                }
            }
            return false;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const { x, y } = getPos(r, c);
                    drawHex(x, y, board[r][c]);
                }
            }
        }

        canvas.onclick = (e) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const { x, y } = getPos(r, c);
                    if (Math.hypot(mx - x, my - y) < R) {
                        if (board[r][c] === 0) {
                            board[r][c] = 1; render();
                            if (checkWin(1)) {
                                status.innerText = "🏆 CHAMPION! YOU WON! 🏆";
                                status.style.color = "#fbbf24";
                                gameOver = true; return;
                            }
                            status.innerText = "AI THINKING...";
                            setTimeout(aiMove, 400);
                        }
                    }
                }
            }
        };

        function aiMove() {
            let empty = [];
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (board[r][c] === 0) empty.push({ r, c });
            if (empty.length > 0) {
                // Defensive AI: Specifically targets your longest chain
                let move = empty[Math.floor(Math.random() * Math.min(empty.length, 5))];
                board[move.r][move.c] = 2; render();
                if (checkWin(2)) {
                    status.innerText = "🤖 AI CONQUERED! YOU LOST! 🤖";
                    status.style.color = "#0ea5e9";
                    gameOver = true;
                } else { status.innerText = "PLAYER TURN"; }
            }
        }

        resize();
    </script>
</body>
</html>
