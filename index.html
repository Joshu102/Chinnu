<!DOCTYPE html>
<html>
<head>
    <title>Hex 3D Pro | AI Championship</title>
    <style>
        body { background: #020617; color: #fff; text-align: center; font-family: 'Orbitron', sans-serif; overflow: hidden; margin: 0; }
        #status { font-size: 30px; margin: 20px; font-weight: bold; text-shadow: 0 0 15px #38bdf8; color: #38bdf8; }
        canvas { cursor: crosshair; filter: drop-shadow(0 0 10px #000); }
    </style>
</head>
<body>
    <div id="status">RED: CONNECT TOP TO BOTTOM</div>
    <canvas id="hexCanvas"></canvas>

    <script>
        const canvas = document.getElementById('hexCanvas');
        const ctx = canvas.getContext('2d');
        const SIZE = 7; const R = 40;
        let board = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
        let gameOver = false;

        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        function getPos(r, c) {
            return { x: 350 + c*70 + r*35, y: 150 + r*60 };
        }

        function drawHex(x, y, p) {
            ctx.save(); ctx.translate(x, y);
            // 3D Shadow
            ctx.beginPath();
            for(let i=0; i<6; i++) ctx.lineTo((R+2)*Math.cos(i*Math.PI/3), (R+2)*Math.sin(i*Math.PI/3)+6);
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fill();

            // Main Block
            ctx.beginPath();
            for(let i=0; i<6; i++) ctx.lineTo(R*Math.cos(i*Math.PI/3), R*Math.sin(i*Math.PI/3));
            ctx.closePath();
            
            let color = p==1 ? "#ff0044" : (p==2 ? "#0088ff" : "#1e293b");
            let grad = ctx.createRadialGradient(0,0,5,0,0,R);
            grad.addColorStop(0, color); grad.addColorStop(1, "#000");
            
            ctx.fillStyle = grad;
            ctx.shadowBlur = p!=0 ? 20 : 0; ctx.shadowColor = color;
            ctx.fill(); ctx.strokeStyle = p!=0 ? color : "#334155";
            ctx.lineWidth = 2; ctx.stroke(); ctx.restore();
        }

        function checkWin(p) {
            let q = [], vis = new Set();
            for(let i=0; i<SIZE; i++) {
                let r = p==1 ? 0 : i, c = p==1 ? i : 0;
                if(board[r][c] == p) { q.push([r,c]); vis.add(r+","+c); }
            }
            while(q.length > 0) {
                let [r,c] = q.shift();
                if((p==1 && r==SIZE-1) || (p==2 && c==SIZE-1)) return true;
                for(let [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1],[-1,1],[1,-1]]) {
                    let nr=r+dr, nc=c+dc;
                    if(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc]==p && !vis.has(nr+","+nc)) {
                        vis.add(nr+","+nc); q.push([nr,nc]);
                    }
                }
            }
            return false;
        }

        function render() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let r=0; r<SIZE; r++) for(let c=0; c<SIZE; c++) {
                let {x,y} = getPos(r,c); drawHex(x,y,board[r][c]);
            }
        }

        canvas.onclick = (e) => {
            if(gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX-rect.left, my = e.clientY-rect.top;
            for(let r=0; r<SIZE; r++) for(let c=0; c<SIZE; c++) {
                let {x,y} = getPos(r,c);
                if(Math.hypot(mx-x, my-y) < R) {
                    if(board[r][c] == 0) {
                        board[r][c] = 1; render();
                        if(checkWin(1)) {
                            document.getElementById('status').innerText = "🏆 CHAMPION! RED WON! 🏆";
                            document.getElementById('status').style.color = "#ffdd00";
                            gameOver = true; return;
                        }
                        setTimeout(aiMove, 300);
                    }
                }
            }
        };

        function aiMove() {
            let empty = [];
            for(let r=0; r<SIZE; r++) for(let c=0; c<SIZE; c++) if(board[r][c]==0) empty.push({r,c});
            if(empty.length > 0) {
                let m = empty[Math.floor(Math.random()*empty.length)];
                board[m.r][m.c] = 2; render();
                if(checkWin(2)) {
                    document.getElementById('status').innerText = "🤖 AI WON! BETTER LUCK NEXT TIME!";
                    gameOver = true;
                }
            }
        }
        render();
    </script>
</body>
</html>
